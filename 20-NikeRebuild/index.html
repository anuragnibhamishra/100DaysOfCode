<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./src/assets/Favicon.svg"
      type="image/x-icon"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./main.css" />
    <title>Nike Rebuild</title>
  </head>
  <body>
    <div
      class="w-full h-8 bg-neutral-200 px-12 flex items-center justify-end font-[Inter] font-medium text-xs tracking-tighter"
    >
      <ul class="flex h-full items-center justify-end text-neutral-950">
        <li class="px-4 border-r border-neutral-950"><a href="#">Help</a></li>
        <li class="px-4 border-r border-neutral-950">
          <button>Sign Up</button>
        </li>
        <li class="px-4"><button>Log In</button></li>
      </ul>
    </div>
    <div class="w-full h-16 bg-neutral-50 sticky top-0 z-50 px-12">
      <div class="max-w-360 mx-auto">
        <div class="grid grid-cols-12 gap-6 h-16 items-center">
          <div class="col-span-3">
            <a href="#"
              ><img src="./src/assets/nikeLogo.svg" alt="nikeLogo" class="h-16"
            /></a>
          </div>
          <div class="col-span-6">
            <div id="main-nav" class="h-16 relative">
              <ul
                class="flex h-full items-center justify-center gap-6 text-neutral-950 font-[Poppins] font-medium text-md tracking-tighter"
              >
                <li data-menu="new" class="relative h-7 group cursor-pointer">
                  <span>New & Featured</span>
                  <span
                    class="absolute left-0 bottom-1 h-[1.6px] w-full bg-black rounded-full scale-x-0 origin-right transition-transform duration-300 ease-out group-hover:scale-x-100 group-hover:origin-left"
                  >
                  </span>
                </li>
                <li data-menu="men" class="relative h-7 group cursor-pointer">
                  <span>Men</span>
                  <span
                    class="absolute left-0 bottom-1 h-[1.6px] w-full bg-black rounded-full scale-x-0 origin-right transition-transform duration-300 ease-out group-hover:scale-x-100 group-hover:origin-left"
                  >
                  </span>
                </li>
                <li data-menu="women" class="relative h-7 group cursor-pointer">
                  <span>Women</span>
                  <span
                    class="absolute left-0 bottom-1 h-[1.6px] w-full bg-black rounded-full scale-x-0 origin-right transition-transform duration-300 ease-out group-hover:scale-x-100 group-hover:origin-left"
                  >
                  </span>
                </li>
                <li data-menu="kids" class="relative h-7 group cursor-pointer">
                  <span>Kids</span>
                  <span
                    class="absolute left-0 bottom-1 h-[1.6px] w-full bg-black rounded-full scale-x-0 origin-right transition-transform duration-300 ease-out group-hover:scale-x-100 group-hover:origin-left"
                  >
                  </span>
                </li>
                <li
                  data-menu="jordan"
                  class="relative h-7 group cursor-pointer"
                >
                  <span>Jordan</span>
                  <span
                    class="absolute left-0 bottom-1 h-[1.6px] w-full bg-black rounded-full scale-x-0 origin-right transition-transform duration-300 ease-out group-hover:scale-x-100 group-hover:origin-left"
                  >
                  </span>
                </li>
              </ul>
            </div>
            <div
              id="mega-menu"
              class="absolute left-0 top-full w-full bg-neutral-50 h-60 overflow-hidden opacity-0 pointer-events-none transition-all duration-300"
            ></div>
          </div>
          <div class="col-span-3">
            <div class="h-16 flex gap-3 items-center justify-end">
              <div
                class="w-40 h-10 hover:w-60 transition-all duration-300 flex bg-neutral-200 hover:bg-neutral-300 rounded-lg"
              >
                <span
                  class="p-2 flex bg-neutral-200 rounded-lg items-center justify-center"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="icon icon-tabler icons-tabler-outline icon-tabler-search"
                  >
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
                    <path d="M21 21l-6 -6" />
                  </svg>
                </span>
                <span
                  class="h-full font-[Poppins] font-normal tracking-tighter text-neutral-950"
                >
                  <input
                    type="text"
                    placeholder="Search"
                    class="w-full h-full rounded-lg outline-none focus:outline-none px-4 py-2 focus:border-black focus:ring-1 focus:ring-black transition-all duration-200 p-2 bg-transparent"
                  />
                </span>
              </div>
              <div
                class="w-10 h-10 hover:bg-neutral-200 rounded-lg flex items-center justify-center"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="icon icon-tabler icons-tabler-outline icon-tabler-heart"
                >
                  <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                  <path
                    d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572"
                  />
                </svg>
              </div>
              <div
                class="w-10 h-10 hover:bg-neutral-200 rounded-lg flex items-center justify-center"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="icon icon-tabler icons-tabler-outline icon-tabler-briefcase-2"
                >
                  <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                  <path
                    d="M3 9a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v9a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-9"
                  />
                  <path d="M8 7v-2a2 2 0 0 1 2 -2h4a2 2 0 0 1 2 2v2" />
                </svg>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="w-full h-fit bg-neutral-950">
      <div
        class="w-full bg-neutral-200 p-2 flex items-center justify-center text-xs font-[Poppins] font-medium tracking-tighter"
      >
        Lorem ipsum dolor sit amet consectetur adipisicing.
      </div>
      <div class="w-full h-full flex justify-center flex-col items-center">
        <div
          class="w-9/12 h-160 bg-neutral-200 rounded-4xl mt-12 flex items-center justify-center"
        >
          <img src="./src/assets/nikeLogo.svg" alt="" />
        </div>
        <div class="w-full h-12 flex items-center justify-center gap-2">
          <span class="w-3 h-3 rounded-full bg-neutral-800"></span>
          <span class="w-3 h-3 rounded-full bg-neutral-800"></span>
          <span class="w-3 h-3 rounded-full bg-neutral-800"></span>
          <span class="w-3 h-3 rounded-full bg-neutral-800"></span>
        </div>
      </div>
    </div>
    <div class="w-full h-screen bg-black"></div>
    <script src="./src/main.js"></script>
  </body>
</html>
