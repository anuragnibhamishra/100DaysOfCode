<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real Time Clock</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div
      id="main"
      class="w-full h-screen selection:bg-neutral-700  bg-neutral-950 font-[Satoshi] flex justify-center items-center text-neutral-100"
    >
      <div id="DateTime" class="flex w-full justify-center h-fit">
        <div
          id="date"
          class="w-fit mr-6 text-7xl max-md:text-4xl max-sm:text-2xl font-bold h-20 flex justify-center items-center"
        ></div>
        <div
          id="time"
          class="w-fit h-20 text-7xl max-md:text-4xl max-sm:text-2xl font-bold flex justify-center items-center"
        ></div>
      </div>
      <div class="w-full absolute top-3/5 gap-6 h-10 flex justify-center items-center">
        <span class="text-lg font-medium text-neutral-500">12 Hour Format</span>
        <div
          id="formatToggle"
          class="relative w-20 h-full bg-neutral-800 rounded-lg justify-between cursor-pointer ease-out duration-1000 flex items-center px-3.5 transition-all"
        >
        <span>0</span><span class="mr-0.5">1</span>
          <div
            id="thumb"
            class="absolute right-1 w-8 h-8 bg-purple-600 rounded-md flex items-center justify-center"
          >
          1
          </div>
        </div>
        <span class="text-lg font-medium text-neutral-500">24 Hour Format</span>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
