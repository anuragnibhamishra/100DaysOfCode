<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="../logo.svg" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
    <title>BMI Calculator</title>
  </head>

  <body
    class="min-h-screen bg-neutral-950 text-neutral-100 font-[satoshi] flex items-center justify-center p-4 selection:bg-[#D6FFB7] selection:text-black"
  >
    <main class="w-full max-w-md bg-neutral-900 p-8 rounded-2xl shadow-2xl">
      <h1 class="text-3xl font-bold text-center mb-6">BMI Calculator</h1>

      <form id="bmiForm" class="space-y-5">
        <div>
          <label for="height" class="block text-sm mb-1 text-neutral-300">
            Height (cm)
          </label>
          <input
            type="number"
            id="height"
            name="height"
            autocomplete="off"
            placeholder="Enter your height"
            required
            class="w-full px-4 py-3 rounded-xl bg-transparent border border-neutral-700 focus:outline-none focus:ring-2 focus:ring-purple-500 appearance-none [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none"
          />
        </div>
        <div>
          <label for="weight" class="block text-sm mb-1 text-neutral-300">
            Weight (kg)
          </label>
          <input
            type="number"
            id="weight"
            name="weight"
            autocomplete="off"
            placeholder="Enter your weight"
            required
            class="w-full px-4 py-3 rounded-xl bg-transparent border border-neutral-700 focus:outline-none focus:ring-2 focus:ring-purple-500 appearance-none [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-purple-600 hover:bg-purple-700 transition text-white py-3 rounded-xl font-semibold"
        >
          Calculate BMI
        </button>
      </form>
      <section class="mt-6 text-center">
        <p id="result" class="text-lg font-medium">
          Your BMI will appear here.
        </p>
        <p id="suggestion" class="mt-2 text-sm text-neutral-400"></p>
      </section>
      <section class="mt-4 text-center">
        <ul id="history" class="text-sm text-neutral-400 space-y-1">
          <li class="text-neutral-500">
            History of calculations will appear here.
          </li>
        </ul>
        <div id="clear">
          <button
            id="clearHistory"
            class="mt-2 text-sm text-red-400 hover:text-red-500 transition"
          >
            Clear History
          </button>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
