<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Profile Slider</title>
    <style>
      ::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body
    class="w-full min-h-screen bg-black text-white font-[Satoshi] flex items-center flex-col gap-2 justify-center"
  >
    <div
      class="w-fit h-fit hover:px-6 p-3 hover:py-3 gap-3 absolute flex items-center transition-all duration-200 cursor-pointer group justify-center bg-neutral-900 rounded-full bottom-4 right-4 z-50"
    >
      <span class="hidden group-hover:inline">A Dhurandhar Special</span>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="icon icon-tabler icons-tabler-outline icon-tabler-info-circle"
      >
        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
        <path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0" />
        <path d="M12 9h.01" />
        <path d="M11 12h1v4h1" />
      </svg>
    </div>
    <div
      id="followingList"
      class="w-full h-16 flex gap-2 items-center justify-center mb-6"
    ></div>
    <div
      class="w-96 overflow-hidden h-fit rounded-4xl justify-center items-center flex relative"
    >
      <div id="root"></div>
    </div>
    <div class="w-full h-fit gap-6 mt-6 flex items-center justify-center">
      <button
        id="prevBtn"
        class="bg-purple-600 px-5 py-2 rounded-2xl flex items-center justify-center cursor-pointer"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="icon icon-tabler icons-tabler-outline icon-tabler-chevron-left"
        >
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <path d="M15 6l-6 6l6 6" />
        </svg>
      </button>
      <button
        id="nextBtn"
        class="bg-purple-600 px-5 py-2 rounded-2xl flex items-center cursor-pointer justify-center"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="icon icon-tabler icons-tabler-filled icon-tabler-chevron-right"
        >
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <path
            d="M9.707 5.293l6 6a1 1 0 0 1 0 1.414l-6 6a1 1 0 1 1 -1.414 -1.414l5.293 -5.293l-5.293 -5.293a1 1 0 0 1 1.414 -1.414"
          />
        </svg>
      </button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
