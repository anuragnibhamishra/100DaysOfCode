<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Currency Notes Counter</title>
</head>
<body>
    <div id="main" class="w-full h-screen gap-18 bg-neutral-950 font-[Satoshi] flex flex-col items-center justify-center text-neutral-50">
        <div class="w-full h-12 flex gap-3">
            <form class="w-full h-full items-center justify-center flex gap-3">
                <div class="w-sm h-full bg-neutral-100/4 rounded-lg border-2 border-neutral-200/4">
                    <input id="INRInput" type="text" placeholder="Enter your currency here" class="w-full focus:ring-2 px-3 rounded-lg focus:ring-purple-600 focus:outline-none  h-full" />
                </div>
            </form>
        </div>
        <div class="w-full h-fit flex gap-3 items-center justify-center">
            <div class="w-fit text-xs h-fit flex flex-col justify-between text-left gap-2"><span class="ml-1">No. of 500s</span><span id="FiveHs" class="bg-neutral-900 text-lg px-10 py-2.5 rounded-xl">0</span></div>
            <div class="w-fit text-xs h-fit flex flex-col justify-between text-left gap-2"><span class="ml-1">No. of 200s</span><span id="TwoHs" class="bg-neutral-900 text-lg px-10 py-2.5 rounded-xl">0</span></div>
            <div class="w-fit text-xs h-fit flex flex-col justify-between text-left gap-2"><span class="ml-1">No. of 100s</span><span id="Hundreds" class="bg-neutral-900 text-lg px-10 py-2.5 rounded-xl">0</span></div>
            <div class="w-fit text-xs h-fit flex flex-col justify-between text-left gap-2"><span class="ml-1">No. of 50s</span><span id="Fiftys" class="bg-neutral-900 text-lg px-10 py-2.5 rounded-xl">0</span></div>
            <div class="w-fit text-xs h-fit flex flex-col justify-between text-left gap-2"><span class="ml-1">No. of 20s</span><span id="Twentys"  class="bg-neutral-900 text-lg px-10 py-2.5 rounded-xl">0</span></div>
            <div class="w-fit text-xs h-fit flex flex-col justify-between text-left gap-2"><span  class="ml-1">No. of 10s</span><span id="Tens" class="bg-neutral-900 text-lg px-10 py-2.5 rounded-xl">0</span></div>
            <div class="w-fit text-xs h-fit flex flex-col justify-between text-left gap-2"><span class="ml-1">No. of 5s</span><span id="Fives" class="bg-neutral-900 text-lg px-10 py-2.5 rounded-xl">0</span></div>
            <div class="w-fit text-xs h-fit flex flex-col justify-between text-left gap-2"><span class="ml-1">No. of 2s</span><span id="Twos" class="bg-neutral-900 text-lg px-10 py-2.5 rounded-xl">0</span></div>
            <div class="w-fit text-xs h-fit flex flex-col justify-between text-left gap-2"><span class="ml-1">No. of 1s</span><span id="Ones" class="bg-neutral-900 text-lg px-10 py-2.5 rounded-xl">0</span></div>
        </div>
        <div id="error" class="w-full h-fit text-center text-red-600 text-sm"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
