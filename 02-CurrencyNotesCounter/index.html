<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Currency Notes Counter</title>
</head>
<body>
    <div id="main" class="w-full min-h-screen p-8 gap-18 bg-neutral-950 font-[Satoshi] flex flex-col items-center justify-center text-neutral-50">
        <div class="w-full h-12 flex gap-3">
            <form class="w-full h-full items-center justify-center flex gap-3">
                <div class="w-sm h-full bg-neutral-100/4 rounded-lg border-2 border-neutral-200/4">
                    <input id="INRInput" type="text" placeholder="Enter your currency here" autocomplete="off" inputmode="numeric" class="w-full focus:ring-2 px-3 rounded-lg focus:ring-purple-600 focus:outline-none  h-full" />
                </div>
            </form>
        </div>
        <div class="w-full h-fit flex gap-3 flex-wrap items-center justify-center" id="notesContainer">
        </div>
        <div id="error" class="w-full h-fit text-center text-red-600 text-sm"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
