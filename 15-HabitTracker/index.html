<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit Tracker</title>
    <style>
      ::-webkit-scrollbar {
        display: none;
      }
      button {
        cursor: pointer;
      }
    </style>
  </head>
  <body
    class="bg-neutral-950 selection:text-neutral-300 selection:bg-neutral-800 text-neutral-50 px-6 pb-6 min-h-screen flex flex-col w-full font-[Satoshi]"
  >
    <div
      id="modalOverlay"
      class="w-full h-full inset-0 p-6 z-50 absolute hidden items-center justify-center bg-neutral-100/1 backdrop-blur-xs"
    >
      <div class="w-lg h-fit bg-neutral-800 rounded-2xl p-4">
        <form class="w-full h-full flex flex-col justify-between gap-2">
          <div class="w-full pl-1">Habit Name</div>
          <input
            autocomplete="off"
            type="text"
            id="habitName"
            class="px-5 py-3 border-2 border-neutral-700 rounded-lg focus:outline-none focus:border-purple-600 w-full text-sm"
            required
            placeholder="Code Daily"
          />
          <div class="w-full pl-1">Habit Description</div>
          <input
            autocomplete="off"
            type="text"
            id="habitDesc"
            class="px-5 py-3 border-2 border-neutral-700 rounded-lg focus:outline-none focus:border-purple-600 w-full text-sm"
            required
            placeholder="I create one project daily & push it on Github"
          />
          <div class="w-full h-fit mt-6 flex gap-4">
            <button
              type="button"
              id="clearBtn"
              class="py-3 w-1/2 rounded-lg bg-red-600"
            >
              Close
            </button>
            <button type="submit" class="py-3 w-1/2 bg-purple-600 rounded-lg">
              Commit
            </button>
          </div>
        </form>
      </div>
    </div>
    <div
      id="editModalOverlay"
      class="w-full h-full inset-0 p-6 z-50 absolute hidden items-center justify-center bg-neutral-100/1 backdrop-blur-xs"
    >
      <div class="w-lg h-fit bg-neutral-800 rounded-2xl p-4">
        <form id="editForm" class="w-full h-full flex flex-col justify-between gap-2">
          <div class="w-full pl-1">Habit Name</div>
          <input
            autocomplete="off"
            type="text"
            id="editHabitName"
            class="px-5 py-3 border-2 border-neutral-700 rounded-lg focus:outline-none focus:border-purple-600 w-full text-sm"
            required
            placeholder="Code Daily"
          />
          <div class="w-full pl-1">Habit Description</div>
          <input
            autocomplete="off"
            type="text"
            id="editHabitDesc"
            class="px-5 py-3 border-2 border-neutral-700 rounded-lg focus:outline-none focus:border-purple-600 w-full text-sm"
            required
            placeholder="I create one project daily & push it on Github"
          />
          <div class="w-full h-fit mt-6 flex gap-4">
            <button
              type="button"
              id="closeEditBtn"
              class="py-3 w-1/2 rounded-lg bg-red-600"
            >
              Cancel
            </button>
            <button type="submit" class="py-3 w-1/2 bg-purple-600 rounded-lg">
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>
    <div class="w-full h-fit p-4 flex items-center justify-between">
      <h1 class="text-2xl">Habit Tracker</h1>
      <button
        id="newHabitBtn"
        class="px-5 py-2 bg-purple-600 cursor-pointer rounded-lg"
      >
        Add a New Habit
      </button>
    </div>
    <div
      id="dateScroller"
      class="w-full h-24 my-2 flex items-center overflow-x-auto gap-4 whitespace-nowrap"
    >
      <!-- min-w required -->
      <div id="datesContainer" class="flex h-fit gap-3 px-1"></div>
    </div>
    <div
      id="habitWrapper"
      class="w-full h-full grow bg-neutral-100/4 flex flex-col gap-4 p-4 rounded-2xl border-2 border-neutral-200/6"
    ></div>
    <div
      class="AnalyticsCardWrapper p-6 w-full h-full absolute inset-0 z-50 items-center hidden justify-center"
    >
      <div
        id="AnalyticsCard"
        class="w-2xl h-4/5 p-4 bg-neutral-100/4 rounded-2xl border-2 border-neutral-200/6 backdrop-blur-2xl"
      >
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl">Habit Analytics</h2>
          <button id="closeAnalytics" class="text-neutral-400 hover:text-white">✕</button>
        </div>
        <div id="overview" class="w-full h-fit items-center flex">

        </div>
        <div class="w-full h-60 mt-4">
          <h2 class="text-lg">History ( Last 60 Days )</h2>
          <div id="historyHeatmap" class="w-full h-fit mt-4 flex flex-wrap gap-1">
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
