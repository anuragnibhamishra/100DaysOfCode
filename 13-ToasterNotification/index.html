<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toast Notification</title>
    <link rel="shortcut icon" href="../logo.svg" type="image/x-icon" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes toast-out {
        from {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
        to {
          opacity: 0;
          transform: translateY(-10px) scale(0.98);
        }
      }

      #toastParent > .toast {
        animation:
          toast-in 250ms ease forwards,
          toast-out 250ms ease var(--toast-stay, 2.75s) forwards;
      }
    </style>
  </head>
  <body>
    <div
      id="main"
      class="w-full min-h-screen bg-neutral-950 font-[Satoshi] text-neutral-100 flex items-center justify-center"
    >
      <button
        id="toastTrigger"
        class="px-8 py-3 bg-purple-600 inline-block items-center justify-center rounded-xl hover:bg-purple-700 cursor-pointer active:scale-98"
      >
        Click Me
      </button>
      <div id="toastParent"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
