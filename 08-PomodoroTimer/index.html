<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="../logo.svg" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      button {
        cursor: pointer;
      }
    </style>
    <title>Pomodoro Timer</title>
  </head>
  <body>
    <div
      class="w-full min-h-screen flex-col bg-neutral-950 text-neutral-100 flex justify-center font-[Satoshi] font-medium items-center gap-6"
    >
      <div
        id="Categories"
        class="w-full h-4 flex gap-4 justify-center items-center"
      >
        <button
          id="longPomodoro"
          class="w-fit h-fit px-6 py-1.5 bg-purple-600/10 border border-purple-600/20 text-[12px] text-purple-500 rounded-full"
        >
          50-10-30
        </button>
        <button
          id="mediumPomodoro"
          class="w-fit h-fit px-6 py-1.5 bg-purple-600/10 border border-purple-600/20 text-[12px] text-purple-500 rounded-full"
        >
          45-15-20
        </button>
        <button
          id="shortPomodoro"
          class="w-fit h-fit px-6 py-1.5 bg-purple-600/10 border border-purple-600/20 text-[12px] text-purple-500 rounded-full"
        >
          25-5-15
        </button>
      </div>
      <div id="LoopDisplay" class="w-full h-fit flex flex-col text-xl items-center justify-center">
        Loop 1/3
      </div>
      <div id="TimerDisplay" class="w-full h-fit text-[160px] py-20 tracking-tighter leading-none text-purple-50 text-center"></div>
      <div id="sessionDisplay" class="w-full h-fit text-xl tracking-tight text-purple-400 text-center mb-8">Focus</div>
      <div
        id="StartStopDiv"
        class="w-full h-12 gap-3 flex items-center justify-center"
      >
        <button
          id="StartBtn"
          class="px-6 py-2.5 gap-2 flex items-center justify-center rounded-xl bg-purple-600"
        >
          <span class="ti ti-player-play"></span>
          Start
        </button>
        <button
          id="PauseBtn"
          class="px-6 py-2.5 gap-2 items-center justify-center rounded-xl hidden bg-purple-600"
        >
          <span class="ti ti-player-pause"></span>
          Pause
        </button>
        <button
          id="ResumeBtn"
          class="px-6 py-2.5 gap-2 items-center justify-center rounded-xl bg-purple-600 hidden"
        >
          <span class="ti ti-player-play"></span>
          Resume
        </button>
        <button
          id="StopBtn"
          class="px-6 py-2.5 gap-2 items-center justify-center rounded-xl bg-purple-400/10 text-purple-400 hidden"
        >
          <span class="ti ti-player-stop"></span>
          Stop
        </button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
