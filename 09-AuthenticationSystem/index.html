<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-neutral-950 text-neutral-100 font-[Satoshi] tracking-tight">
    <div id="authSection" class="min-h-screen flex items-center justify-center">
      <div
        class="bg-neutral-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-neutral-800/50"
      >
        <h2
          class="text-2xl font-medium mb-6 text-center text-purple-600"
          id="formTitle"
        >
          Welcome
        </h2>
        <form id="signup" class="space-y-4" novalidate>
          <input
            type="text"
            id="name"
            placeholder="Full Name"
            required
            class="w-full px-4 py-2 bg-neutral-900 border-2 border-neutral-800/50 rounded-lg text-neutral-100 placeholder-neutral-500 focus:outline-none focus:border-purple-500 focus:ring-0.5 focus:ring-purple-500"
            aria-label="Full Name"
          />
          <input
            type="email"
            id="email"
            placeholder="Email"
            required
            class="w-full px-4 py-2 bg-neutral-900 border-2 border-neutral-800/50 rounded-lg text-neutral-100 placeholder-neutral-500 focus:outline-none focus:border-purple-500 focus:ring-0.5 focus:ring-purple-500"
            aria-label="Email Address"
          />
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
            class="w-full px-4 py-2 bg-neutral-900 border-2 border-neutral-800/50 rounded-lg text-neutral-100 placeholder-neutral-500 focus:outline-none focus:border-purple-500 focus:ring-0.5 focus:ring-purple-500"
            aria-label="Password"
          />
          <div
            id="error"
            class="w-full h-fit text-red-500 flex items-center justify-center"
            role="alert"
          ></div>
          <button
            type="submit"
            class="w-full bg-purple-600 cursor-pointer text-neutral-100 py-2 rounded-lg font-medium hover:bg-purple-700 transition duration-200"
          >
            Sign Up
          </button>
          <p class="text-center text-sm text-neutral-400">
            Already have an account?
            <a
              href="#"
              class="text-purple-400 hover:text-purple-300"
              id="showLoginLink"
              >Log In</a
            >
          </p>
        </form>
        <form id="login" class="space-y-4 hidden" novalidate>
          <input
            type="email"
            id="loginEmail"
            placeholder="Email"
            required
            class="w-full px-4 py-2 bg-neutral-900 border-2 border-neutral-800/50 rounded-lg text-neutral-100 placeholder-neutral-500 focus:outline-none focus:border-purple-500 focus:ring-0.5 focus:ring-purple-500"
            aria-label="Email Address"
          />
          <input
            type="password"
            id="loginPassword"
            placeholder="Password"
            required
            class="w-full px-4 py-2 bg-neutral-900 border-2 border-neutral-800/50 rounded-lg text-neutral-100 placeholder-neutral-500 focus:outline-none focus:border-purple-500 focus:ring-0.5 focus:ring-purple-500"
            aria-label="Password"
          />
          <div
            id="loginError"
            class="w-full h-fit text-red-500 flex items-center justify-center"
            role="alert"
          ></div>
          <button
            type="submit"
            class="w-full bg-purple-600 cursor-pointer text-neutral-100 py-2 rounded-lg font-medium hover:bg-purple-700 transition duration-200"
          >
            Log In
          </button>
          <p class="text-center text-sm text-neutral-400">
            Don't have an account?
            <a
              href="#"
              class="text-purple-400 hover:text-purple-300"
              id="showSignupLink"
              >Sign Up</a
            >
          </p>
        </form>
      </div>
    </div>
    <div
      id="dashboard"
      class="hidden min-h-screen items-center justify-center"
    >
      <div class="bg-neutral-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-neutral-800/50">
        <h2
          id="welcome"
          class="text-2xl font-medium mb-6 text-center text-purple-500"
        ></h2>
        <div class="space-y-4">
          <p class="text-neutral-300 text-center">
            You are successfully logged in!
          </p>
          <button
            id="logoutBtn"
            class="w-full bg-red-600 text-white py-2 rounded-lg font-medium hover:bg-red-700 transition duration-200"
          >
            Log Out
          </button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
