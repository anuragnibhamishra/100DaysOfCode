<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi Step Form Handling System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div
      id="main"
      class="w-full min-h-screen bg-neutral-950 text-neutral-100 font-[Satoshi] flex"
    >
      <div id="sidebar" class="w-64 bg-neutral-900 p-4">
        <div class="w-full h-fit flex items-center">
          <img src="../logo.svg" alt="Logo" width="30" />
          <div>
            <h1 class="text-xl leading-none tracking-tight ml-2">Semicolon</h1>
            <p class="text-xs leading-none text-neutral-500 ml-2 mt-1">
              College of Engineering
            </p>
          </div>
        </div>
        <h2 class="leading-tight mt-8 tracking-tight">Complete this 6 step form to secure your seat in our college.</h2>
        <div id="stepsContainer" class="mt-8 flex flex-col gap-2">
            
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
