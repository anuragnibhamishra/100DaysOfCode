<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Tic Tac Toe</title>
</head>
<body>
    <div class="w-full min-h-screen bg-neutral-950 text-neutral-100 font-[Satoshi] flex items-center justify-center p-4">
        <div class="w-sm flex flex-col items-center justify-center gap-4 text-center">
            <div class="">
                <h1 class="text-3xl text-neutral-100">Tic Tac Toe</h1>
                <p id="status" class=" text-neutral-400">Play as X. The computer is O and uses Minimax.</p>
            </div>

            <div id="board" class="grid gap-2 grid-cols-3 grid-rows-3 w-fit  ">
                <div class="w-20 h-20 bg-neutral-100/4 border-2 border-neutral-200/6 rounded-xl flex items-center justify-center text-4xl font-bold text-purple-800 hover:border-purple-900 cursor-pointer select-none boxes"></div>
                <div class="w-20 h-20 bg-neutral-100/4 border-2 border-neutral-200/6 rounded-xl flex items-center justify-center text-4xl font-bold text-purple-800 hover:border-purple-900 cursor-pointer select-none boxes"></div>
                <div class="w-20 h-20 bg-neutral-100/4 border-2 border-neutral-200/6 rounded-xl flex items-center justify-center text-4xl font-bold text-purple-800 hover:border-purple-900 cursor-pointer select-none boxes"></div>
                <div class="w-20 h-20 bg-neutral-100/4 border-2 border-neutral-200/6 rounded-xl flex items-center justify-center text-4xl font-bold text-purple-800 hover:border-purple-900 cursor-pointer select-none boxes"></div>
                <div class="w-20 h-20 bg-neutral-100/4 border-2 border-neutral-200/6 rounded-xl flex items-center justify-center text-4xl font-bold text-purple-800 hover:border-purple-900 cursor-pointer select-none boxes"></div>
                <div class="w-20 h-20 bg-neutral-100/4 border-2 border-neutral-200/6 rounded-xl flex items-center justify-center text-4xl font-bold text-purple-800 hover:border-purple-900 cursor-pointer select-none boxes"></div>
                <div class="w-20 h-20 bg-neutral-100/4 border-2 border-neutral-200/6 rounded-xl flex items-center justify-center text-4xl font-bold text-purple-800 hover:border-purple-900 cursor-pointer select-none boxes"></div>
                <div class="w-20 h-20 bg-neutral-100/4 border-2 border-neutral-200/6 rounded-xl flex items-center justify-center text-4xl font-bold text-purple-800 hover:border-purple-900 cursor-pointer select-none boxes"></div>
                <div class="w-20 h-20 bg-neutral-100/4 border-2 border-neutral-200/6 rounded-xl flex items-center justify-center text-4xl font-bold text-purple-800 hover:border-purple-900 cursor-pointer select-none boxes"></div>
            </div>

            <button id="resetButton" class=" px-6 py-3 rounded-lg bg-purple-600 hover:bg-purple-700 text-white leading-none transition">Restart Game</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
